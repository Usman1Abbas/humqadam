<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="HumQadam — voice-first civic assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#125a4d"/>
      <stop offset="1" stop-color="#1b9c85"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#e9c46a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- mic + sound-wave motif -->
  <g transform="translate(980,190)" stroke="#e9c46a" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.92">
    <rect x="-18" y="-70" width="36" height="80" rx="18" fill="#e9c46a" stroke="none"/>
    <path d="M -40 -20 a 40 40 0 0 0 80 0"/>
    <line x1="0" y1="20" x2="0" y2="48"/>
    <line x1="-22" y1="48" x2="22" y2="48"/>
    <path d="M 70 -36 a 46 46 0 0 1 0 72" opacity="0.7"/>
    <path d="M 96 -56 a 76 76 0 0 1 0 112" opacity="0.4"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff">HumQadam</text>
  <text x="84" y="210" font-family="Noto Nastaliq Urdu, serif" font-size="46" fill="#e9c46a">ہم قدم</text>

  <text x="84" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#dcefe9">Your vote starts with a conversation, not a form.</text>
  <text x="84" y="312" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#9ec9bf">Voice-first civic assistant · Urdu · Punjabi · Pashto · grounded in official sources</text>
</svg>
